; ═══════════════════════════════════════════════════════════════
; ETS2 Dashboard — Minimal (WiFi + LVGL TFT)
; Board: Freenove ESP32-S3 WROOM
; ═══════════════════════════════════════════════════════════════

[env:freenove_esp32_s3_wroom]
platform  = espressif32
board     = freenove_esp32_s3_wroom
framework = arduino

; Partition cần đủ chỗ cho LVGL + fonts (~1.5MB app)
board_build.partitions = 16m.csv
board_build.flash_size = 16MB
upload_speed   = 921600
monitor_speed  = 115200
;monitor_filters = esp32_exception_decoder

; ── Libraries ──────────────────────────────────────────────────
lib_deps =
  lvgl/lvgl @ ^8.3.11
  bblanchon/ArduinoJson @ ^7.0.4

; ── Build flags ────────────────────────────────────────────────
build_flags =
  ; LVGL: trỏ lv_conf.h tới include/ của project
  -D LV_CONF_INCLUDE_SIMPLE=1
  -I src
  ; PSRAM
  -D BOARD_HAS_PSRAM=1
  -mfix-esp32-psram-cache-issue

  ; Debug level (đặt 0 khi production)
  -D CORE_DEBUG_LEVEL=0
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MODE=1